<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Power Scheme Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container glass-panel">
        <header>
            <h1>AI Power Scheme Generator</h1>
            <p>Upload your requirements to generate automated component selection and schematics via OpenRouter LLM.</p>
        </header>

        <div class="config-section">
            <div class="input-group">
                <label for="apiKey">OpenRouter API Key <span class="required">*</span></label>
                <input type="password" id="apiKey" placeholder="sk-or-v1-..." required>
            </div>

            <!-- Requirements Input -->
            <div class="input-group">
                <label for="reqText">Power Requirements <span class="required">*</span></label>
                <textarea id="reqText" rows="8" placeholder="Paste your requirements here, e.g.:
Input Voltage : 12 V
Output Voltages(V) : V1 = 3.3, V2 = 5, V3 = 0.85
Output Currents (A) : A1 = 6, A2 = 3.5, A3 = 0.5
Efficiency(%) : 90
Ambient Temperature(degCel): 85
PSRR : >35dB
Ripple: <15mV" style="width:100%; background: rgba(15,23,42,0.6); border: 1px solid var(--border); border-radius:12px; padding:1rem; color:var(--text); font-size:0.95rem; resize:vertical; outline:none; font-family:monospace;"></textarea>
                <span style="color:var(--text-muted); font-size:0.85rem;">— OR upload a file below —</span>
            </div>

            <!-- Optional File Upload -->
            <label class="upload-zone" id="uploadZone" for="fileInput" style="padding: 1.5rem;">
                <div class="upload-content">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p style="margin:0;">Click to upload a requirement file (optional)</p>
                    <span class="subtext">Supported: .txt, .json, .csv — will overwrite text above</span>
                    <span class="browse-btn">Browse File</span>
                </div>
                <input type="file" id="fileInput" accept=".json,.txt,.csv,.text" style="display:none">
            </label>

            <!-- File selection status -->
            <div id="fileStatus" style="display:flex; align-items:center; gap:0.75rem; padding: 0.5rem 1rem; border-radius:10px; background: rgba(255,255,255,0.05); min-height:2rem;">
                <span style="color: var(--text-muted); font-size:0.85rem;">No file selected — type requirements in the box above</span>
            </div>

            <button id="generateBtn" class="primary-btn pulse-hover">
                Generate Power Scheme
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader-container hidden">
            <div class="spinner"></div>
            <p>Analyzing requirements and generating scheme...</p>
        </div>

        <!-- Results Section -->
        <div id="results" class="results-container hidden">
            <!-- Dynamic Schemes Container -->
            <div id="schemesContainer"></div>
            
            <!-- Final Summary -->
            <div class="result-card" style="margin-top: 1rem; border-color: var(--primary);">
                <h2>Executive Summary & Comparison</h2>
                <p id="finalSummaryText" style="line-height: 1.6; color: var(--text-muted);"></p>
            </div>

            <!-- Export Actions -->
            <div class="result-card" style="text-align: center; background: rgba(139, 92, 246, 0.1);">
                <button id="downloadBtn" class="primary-btn pulse-hover" style="margin: 0 auto;">
                    Download HTML Report
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
